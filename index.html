<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>What's Your Surf Score? — Improve Surfing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5fbfd; --bg2:#ecf5fa; --bg3:#e2eef5;
  --surface:#ffffff; --surface2:#f1f8fc;
  --line:#dce8f0; --line2:#e9f2f7;
  --text:#0c2a3f; --dim:#5a7488; --mute:#93a7b6;
  --aqua:#0fb4c4; --aqua-deep:#0a97a6; --blue:#2b8fd6; --navy:#0c2a3f;
  --orange:#ff6a4d; --orange-deep:#ee5334;
  --green:#10b981; --green-deep:#059669; --red:#ef4444; --red-deep:#c62828;
  --gold:#f5a623; --ink:#ffffff;
  --f:'Poppins',system-ui,-apple-system,sans-serif;
  --track:rgba(12,42,63,.10);
  --shadow:0 22px 55px -22px rgba(12,42,63,.28);
  --shadow-card:0 8px 24px -14px rgba(12,42,63,.18);
  --shadow-btn:0 16px 34px -12px rgba(255,106,77,.45);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#f5fbfd}
body{font-family:var(--f);background:radial-gradient(130% 80% at 50% -12%,#dff0f7 0%,var(--bg) 55%);color:var(--text);-webkit-font-smoothing:antialiased;display:flex;justify-content:center;min-height:100%}
#shell{width:100%;max-width:460px;min-height:100vh;display:flex;flex-direction:column;position:relative}

/* top bar */
#topbar{padding:16px 22px 8px;position:sticky;top:0;z-index:5;background:linear-gradient(to bottom,var(--bg) 62%,transparent)}
.brand{display:flex;align-items:center;gap:9px;justify-content:center;margin-bottom:13px}
.brand .mark{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--aqua),var(--blue));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#04121d;box-shadow:0 4px 16px rgba(34,211,238,.4)}
.brand .wm{font-size:10.5px;letter-spacing:.22em;font-weight:600;color:var(--mute);text-transform:uppercase}
.brand .wm b{color:var(--aqua)}
.progress-wrap{display:flex;align-items:center;gap:10px}
.bar{flex:1;height:6px;background:var(--track);border-radius:99px;overflow:hidden}
.bar>i{display:block;height:100%;width:0%;background:linear-gradient(90deg,var(--aqua),var(--blue));border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.qcount{font-size:10.5px;font-weight:600;color:var(--dim);white-space:nowrap;letter-spacing:.02em}

#app{flex:1;padding:6px 22px 38px;display:flex;flex-direction:column}
.step{animation:stepIn .35s ease both;display:flex;flex-direction:column;flex:1}
@keyframes stepIn{from{opacity:0}to{opacity:1}}
/* staggered entrance — every screen cascades in */
.step>*{animation:childIn .5s cubic-bezier(.22,1,.36,1) backwards}
.step>*:nth-child(2){animation-delay:.05s}.step>*:nth-child(3){animation-delay:.10s}
.step>*:nth-child(4){animation-delay:.15s}.step>*:nth-child(5){animation-delay:.20s}
.step>*:nth-child(6){animation-delay:.25s}.step>*:nth-child(7){animation-delay:.30s}
.step>*:nth-child(8){animation-delay:.35s}.step>*:nth-child(9){animation-delay:.40s}
@keyframes childIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.opts .opt{animation:optIn .45s cubic-bezier(.22,1,.36,1) backwards}
.opts .opt:nth-child(1){animation-delay:.12s}.opts .opt:nth-child(2){animation-delay:.19s}
.opts .opt:nth-child(3){animation-delay:.26s}.opts .opt:nth-child(4){animation-delay:.33s}
.opts .opt:nth-child(5){animation-delay:.40s}.opts .opt:nth-child(6){animation-delay:.47s}
@keyframes optIn{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
.gcard,.acard{animation:optIn .45s cubic-bezier(.22,1,.36,1) backwards}
.gcards .gcard:nth-child(2),.acards .acard:nth-child(2){animation-delay:.08s}
.acards .acard:nth-child(3){animation-delay:.16s}.acards .acard:nth-child(4){animation-delay:.24s}
.plans .plan{animation:optIn .45s cubic-bezier(.22,1,.36,1) backwards}
.plans .plan:nth-child(2){animation-delay:.08s}.plans .plan:nth-child(3){animation-delay:.16s}.plans .plan:nth-child(4){animation-delay:.24s}
/* ambient ocean background */
.bgfx{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bgfx i{position:absolute;border-radius:50%;filter:blur(46px);opacity:.55}
.bgfx .b1{width:340px;height:340px;background:radial-gradient(circle,rgba(15,180,196,.17),transparent 70%);top:-80px;left:-90px;animation:drift1 16s ease-in-out infinite alternate}
.bgfx .b2{width:300px;height:300px;background:radial-gradient(circle,rgba(43,143,214,.14),transparent 70%);bottom:-70px;right:-80px;animation:drift2 19s ease-in-out infinite alternate}
.bgfx .b3{width:230px;height:230px;background:radial-gradient(circle,rgba(255,106,77,.08),transparent 70%);top:38%;right:-60px;animation:drift3 22s ease-in-out infinite alternate}
@keyframes drift1{to{transform:translate(70px,50px) scale(1.15)}}
@keyframes drift2{to{transform:translate(-60px,-45px) scale(1.1)}}
@keyframes drift3{to{transform:translate(-45px,60px) scale(1.2)}}

.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--aqua);font-weight:700;margin-bottom:13px;display:flex;align-items:center;gap:8px}
.eyebrow:before{content:"";width:16px;height:2px;background:var(--orange);border-radius:2px}
h1{font-size:25px;line-height:1.2;font-weight:800;letter-spacing:-.02em;margin-bottom:11px;color:var(--text)}
h1 .hl{color:var(--aqua)}
h1 .red{color:var(--orange)}
.sub{font-size:14.5px;line-height:1.5;color:var(--dim);margin-bottom:24px}
.sub b{color:var(--text);font-weight:600}

/* options */
.opts{display:flex;flex-direction:column;gap:10px;margin-top:2px}
.opt{display:flex;align-items:center;gap:13px;background:var(--surface);border:1.5px solid var(--line);border-radius:14px;padding:16px;cursor:pointer;text-align:left;box-shadow:var(--shadow-card);transition:transform .15s,border-color .15s,background .15s}
.opt:hover{border-color:var(--aqua);transform:translateY(-1px)}
.opt:active{transform:scale(.99)}
.opt.sel{border-color:var(--aqua);background:linear-gradient(180deg,rgba(34,211,238,.10),rgba(59,130,246,.05))}
.opt .tick{width:22px;height:22px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.15s}
.opt.sel .tick{border-color:var(--aqua);background:var(--aqua)}
.opt.sel .tick:after{content:"";width:7px;height:7px;border-radius:50%;background:var(--ink)}
.opt .txt{font-size:14.5px;font-weight:600;line-height:1.3;color:var(--text)}
.opt .emoji{font-size:18px}

/* gender cards */
.gcards{display:flex;gap:12px;margin-top:4px}
.gcard{flex:1;background:var(--surface);border:1.5px solid var(--line);border-radius:16px;padding:0 0 14px;cursor:pointer;overflow:hidden;box-shadow:var(--shadow-card);transition:.15s;text-align:center}
.gcard:hover{transform:translateY(-2px);border-color:var(--aqua)}
.gcard.sel{border-color:var(--aqua);background:linear-gradient(180deg,rgba(34,211,238,.08),transparent)}
.gcard .gbadge{width:78px;height:78px;border-radius:50%;margin:26px auto 0;display:flex;align-items:center;justify-content:center;font-size:40px;background:linear-gradient(135deg,rgba(15,180,196,.16),rgba(43,143,214,.10));border:1px solid rgba(15,180,196,.32);transition:.15s}
.gcard.sel .gbadge{background:linear-gradient(135deg,rgba(15,180,196,.28),rgba(43,143,214,.16));border-color:var(--aqua)}
.gcard .gname{font-size:15px;font-weight:700;margin-top:13px;color:var(--text)}
.gcard.alt{flex:none;width:100%;display:flex;align-items:center;justify-content:center;gap:9px;padding:15px;margin-top:11px;color:var(--dim);font-weight:600}

/* buttons */
.cta{margin-top:auto;width:100%;border:none;cursor:pointer;background:linear-gradient(135deg,var(--orange),var(--orange-deep));color:#fff;font-weight:700;font-size:16px;padding:17px;border-radius:14px;box-shadow:var(--shadow-btn);transition:transform .15s,box-shadow .15s}
.cta:hover{transform:translateY(-2px)}
.cta:active{transform:scale(.98)}
.cta:disabled{opacity:.4;filter:grayscale(.3);cursor:not-allowed;box-shadow:none;transform:none}
.cta.green{background:linear-gradient(135deg,var(--aqua),var(--aqua-deep));color:#04302c;box-shadow:0 16px 34px -12px rgba(34,211,238,.5)}
.btnnote{text-align:center;font-size:11.5px;color:var(--dim);margin-top:11px}
.btnnote b{color:var(--aqua)}

/* image slots */
.imgslot{width:100%;border-radius:16px;object-fit:cover;display:block}
.imgslot.ph{background:linear-gradient(135deg,var(--bg3),var(--surface2));border:1px dashed var(--line);display:flex;align-items:center;justify-content:center;text-align:center;color:var(--mute);font-size:11px;letter-spacing:.05em;padding:10px;line-height:1.4;font-weight:600;min-height:120px}
.ar-hero{aspect-ratio:16/10}.ar-port{aspect-ratio:3/4}.ar-wide{aspect-ratio:16/9}.ar-sq{aspect-ratio:1/1}.ar-card{aspect-ratio:4/5}

/* age image cards (2x2) */
.acards{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:2px}
.acard{background:var(--surface);border:1.5px solid var(--line);border-radius:16px;padding:0 0 11px;cursor:pointer;overflow:hidden;box-shadow:var(--shadow-card);transition:.15s;text-align:center}
.acard:hover{transform:translateY(-2px);border-color:var(--aqua)}
.acard.sel{border-color:var(--aqua);background:linear-gradient(180deg,rgba(34,211,238,.08),transparent)}
.acard .imgslot{border-radius:0}
.acard .imgslot.ph{font-size:10px;min-height:96px}
.acard .aname{font-size:13.5px;font-weight:700;margin-top:8px;color:var(--text)}

/* intro */
.intro-badge{align-self:flex-start;display:inline-flex;align-items:center;gap:7px;background:rgba(34,211,238,.12);border:1px solid rgba(34,211,238,.3);color:var(--aqua);font-size:11px;font-weight:700;padding:6px 12px;border-radius:99px;margin-bottom:16px;letter-spacing:.05em;text-transform:uppercase}
.intro-h{font-size:33px;line-height:1.08;font-weight:800;letter-spacing:-.025em;margin:6px 0 14px;color:var(--text)}
.intro-h .red{color:var(--orange)}
.intro-h .hl{color:var(--aqua)}
.trust{display:flex;gap:16px;margin:18px 0 6px}
.trust .t b{font-size:24px;font-weight:800;color:var(--text);display:block;line-height:1}
.trust .t span{font-size:10.5px;color:var(--dim)}
.spacer{flex:1;min-height:14px}

/* text inputs */
.bigfield{margin-top:6px}
.bigfield input{width:100%;background:var(--surface);border:1.5px solid var(--line);border-radius:14px;padding:17px;color:var(--text);font-size:17px;font-family:inherit;font-weight:600;box-shadow:var(--shadow-card);transition:.15s}
.bigfield input:focus{outline:none;border-color:var(--aqua)}
.bigfield input::placeholder{color:var(--mute);font-weight:500}
.field{margin-bottom:13px}
.field label{display:block;font-size:11px;letter-spacing:.04em;font-weight:700;color:var(--dim);margin-bottom:7px;text-transform:uppercase}
.field input{width:100%;background:var(--surface);border:1.5px solid var(--line);border-radius:13px;padding:15px;color:var(--text);font-size:15px;font-family:inherit;box-shadow:var(--shadow-card);transition:.15s}
.field input:focus{outline:none;border-color:var(--aqua)}
.field input::placeholder{color:var(--mute)}
.suggest{margin-top:7px;background:var(--surface);border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:var(--shadow-card);display:none}
.sugg{padding:11px 14px;font-size:14.5px;cursor:pointer;color:var(--dim);border-bottom:1px solid var(--line2)}
.sugg:last-child{border-bottom:none}
.sugg:hover{background:var(--bg2)}
.sugg b{color:var(--text);font-weight:600}
.phonewrap{display:flex;align-items:stretch;gap:8px}
.ccode{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1.5px solid var(--line);border-radius:13px;padding:0 13px;font-size:15px;font-weight:700;color:var(--text);box-shadow:var(--shadow-card);white-space:nowrap}
.flag{width:23px;height:16px;border-radius:3px;object-fit:cover;box-shadow:0 0 0 1px rgba(255,255,255,.12)}
.phonewrap input{flex:1;min-width:0;background:var(--surface);border:1.5px solid var(--line);border-radius:13px;padding:15px;color:var(--text);font-size:15px;font-family:inherit;box-shadow:var(--shadow-card);transition:.15s}
.phonewrap input:focus{outline:none;border-color:var(--aqua)}
.phonewrap input::placeholder{color:var(--mute)}
.privacy{display:flex;align-items:center;gap:8px;justify-content:center;font-size:11.5px;color:var(--dim);margin-top:13px}
.privacy svg{width:14px;height:14px;fill:var(--green)}

/* loader */
.loader-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center}
.lstat{font-size:21px;font-weight:800;margin-bottom:6px;color:var(--text)}
.lsub{font-size:13px;color:var(--dim);margin-bottom:26px}
.checks{display:flex;flex-direction:column;gap:12px;text-align:left;max-width:300px;margin:0 auto}
.chk{display:flex;align-items:center;gap:12px;font-size:14px;font-weight:600;color:var(--mute);opacity:.45;transition:.35s}
.chk.active,.chk.done{opacity:1;color:var(--text)}
.chk .cb{width:23px;height:23px;border-radius:7px;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.3s}
.chk.done .cb{background:var(--green);border-color:var(--green)}
.chk.done .cb:after{content:"✓";color:#04121d;font-weight:800;font-size:12px}
.chk.active .cb{border-color:var(--aqua);background:transparent}
.chk.active .cb:after{content:"";width:11px;height:11px;border:2px solid var(--aqua);border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* circular ring */
.ring-wrap{position:relative;width:122px;height:122px;margin:0 auto 22px}
.ring-wrap:before{content:"";position:absolute;inset:10px;border-radius:50%;background:radial-gradient(circle,rgba(34,211,238,.18),transparent 70%);animation:pulse 1.8s ease-in-out infinite}
.ring-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:29px;font-weight:800;color:var(--text)}
@keyframes pulse{0%,100%{opacity:.45;transform:scale(.95)}50%{opacity:1;transform:scale(1.06)}}
.testi{margin-top:24px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;font-size:12.5px;color:var(--dim);min-height:62px;display:flex;align-items:flex-start;gap:11px;box-shadow:var(--shadow-card);text-align:left}
.testi .av{width:38px;height:38px;border-radius:50%;flex-shrink:0;object-fit:cover}
.testi .avph{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--aqua),var(--blue));display:flex;align-items:center;justify-content:center;font-weight:700;color:#04121d;font-size:14px;flex-shrink:0}
.tbody{display:flex;flex-direction:column;gap:3px}
.tbody span{font-style:italic;line-height:1.4}
.tbody b{color:var(--text);font-size:11.5px}
.stars{color:var(--gold);font-size:11px;letter-spacing:1.5px}
.trustline{margin-top:16px;font-size:11.5px;color:var(--dim);text-align:center}
.trustline b{color:var(--text)}
.trustline .stars{display:inline}

/* reveal */
.reveal-wrap{text-align:center;display:flex;flex-direction:column;flex:1}
.gauge{position:relative;width:240px;height:138px;margin:4px auto 0}
.bignum{font-size:56px;font-weight:800;letter-spacing:-.02em;color:var(--orange);line-height:1;margin-top:2px}
.bignum .of{font-size:22px;color:var(--mute);font-weight:700}
.reveal-label{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);font-weight:700;margin-top:12px}
.reveal-headline{font-size:22px;font-weight:800;line-height:1.24;margin:14px 4px 9px;color:var(--text)}
.reveal-headline .red{color:var(--orange)}
.reveal-body{font-size:14px;line-height:1.55;color:var(--dim);margin-bottom:6px}
.reveal-body b{color:var(--text)}
.tenyr{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.28);border-radius:14px;padding:14px;margin:16px 0;font-size:13.5px;color:var(--red-deep)}
.tenyr b{color:var(--red);font-weight:800;font-size:16px}

/* projection */
.legend{display:flex;justify-content:center;gap:18px;margin-top:4px;font-size:11.5px;font-weight:600;color:var(--text)}
.legend i{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px}
.proj-row{display:flex;gap:11px;margin:12px 0}
.proj-card{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:13px;text-align:center;box-shadow:var(--shadow-card)}
.proj-card.bad{border-color:rgba(244,63,94,.32)}
.proj-card.good{border-color:rgba(34,211,238,.5);background:linear-gradient(180deg,rgba(34,211,238,.08),transparent)}
.proj-card .pn{font-size:34px;line-height:1;font-weight:800}
.proj-card.bad .pn{color:var(--red)}
.proj-card.good .pn{color:var(--aqua)}
.proj-card .pl{font-size:10.5px;color:var(--dim);margin-top:5px;line-height:1.3}
.chartbox2{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:14px 10px 8px;margin:6px 0 14px;box-shadow:var(--shadow-card)}
.chartbox2 .ctag{fill:#fff;font:700 11px 'Poppins',sans-serif;text-anchor:middle}
.chartbox2 .cfree{fill:var(--dim);font:600 10px 'Poppins',sans-serif}
.chartbox2 .caxis{fill:var(--mute);font:500 9.5px 'Poppins',sans-serif}
.savedpill{display:block;background:linear-gradient(135deg,rgba(34,211,238,.16),rgba(59,130,246,.10));border:1px solid rgba(34,211,238,.45);border-radius:12px;padding:12px 14px;font-size:13.5px;color:var(--text);font-weight:600;margin:0 0 14px;text-align:center;line-height:1.4}
.savedpill b{color:var(--aqua)}

/* bridge */
.auth-grid{display:flex;gap:9px;margin:16px 0}
.auth-grid .a{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:12px 6px;text-align:center;box-shadow:var(--shadow-card)}
.auth-grid .a b{display:block;font-size:23px;font-weight:800;color:var(--aqua)}
.auth-grid .a span{font-size:10px;color:var(--dim);line-height:1.2;display:block;margin-top:3px}
.methodrow{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0 4px}
.methodrow .m{background:var(--surface2);border:1px solid var(--line);border-radius:99px;padding:8px 13px;font-size:12px;font-weight:600;color:var(--text)}
.methodrow .m b{color:var(--aqua)}

/* tier result */
.tiercard{background:linear-gradient(160deg,#123a55,#0b2739);border:1.5px solid rgba(15,180,196,.45);border-radius:20px;padding:20px;margin:6px 0 14px;position:relative;overflow:hidden;box-shadow:var(--shadow);text-align:left}
.tiercard:before{content:"";position:absolute;top:-50px;right:-50px;width:150px;height:150px;background:radial-gradient(circle,rgba(34,211,238,.3),transparent 70%)}
.tiercard .tier-tag{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--aqua);font-weight:700;margin-bottom:7px}
.tiercard .tier-name{font-size:26px;font-weight:800;line-height:1.05;margin-bottom:8px;color:#fff;letter-spacing:-.01em}
.tiercard .tier-price{display:flex;align-items:baseline;gap:6px;margin-bottom:4px}
.tiercard .tier-price b{font-size:34px;font-weight:800;color:#2fd4e6;line-height:1}
.tiercard .tier-price span{font-size:13px;color:var(--dim);font-weight:600}
.tiercard .tier-meta{font-size:12px;color:#a9c3da;margin-bottom:14px}
.tiercard .tier-meta b{color:var(--aqua)}
.tier-inc{list-style:none;display:flex;flex-direction:column;gap:8px;margin-top:4px}
.tier-inc li{display:flex;align-items:flex-start;gap:9px;font-size:12.5px;color:#dcebf7;line-height:1.35}
.tier-inc li:before{content:"✓";color:var(--aqua);font-weight:800;flex-shrink:0}
.scarce{display:flex;align-items:center;justify-content:center;gap:8px;font-size:12px;font-weight:600;color:#fca5b5;margin:2px 0 12px}
.scarce .dotr{width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 0 4px rgba(244,63,94,.2);animation:pulse 1.6s infinite}
.guar{display:flex;align-items:center;gap:8px;justify-content:center;font-size:12px;color:var(--dim);margin-top:12px}
.guar svg{width:15px;height:15px;fill:var(--green);flex-shrink:0}

/* plans / payment */
.plans{display:flex;flex-direction:column;gap:11px;margin:8px 0 4px}
.plan{display:flex;align-items:center;gap:12px;background:var(--surface);border:2px solid var(--line);border-radius:16px;padding:15px 16px;cursor:pointer;box-shadow:var(--shadow-card);transition:.15s;position:relative}
.plan:hover{border-color:var(--aqua)}
.plan.sel{border-color:var(--aqua);background:linear-gradient(180deg,rgba(34,211,238,.09),transparent)}
.plan .pradio{width:22px;height:22px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.15s}
.plan.sel .pradio{border-color:var(--aqua);background:var(--aqua)}
.plan.sel .pradio:after{content:"";width:7px;height:7px;border-radius:50%;background:var(--ink)}
.plan .pinfo{flex:1;text-align:left;min-width:0}
.plan .pn2{font-size:15px;font-weight:800;color:var(--text);line-height:1.15}
.plan .pm{font-size:11px;color:var(--dim);margin-top:3px}
.plan .pprice{text-align:right;flex-shrink:0}
.plan .pday b{font-size:23px;font-weight:800;color:var(--aqua);line-height:1}
.plan .pday span{font-size:11px;color:var(--dim);font-weight:600}
.plan .pweek{font-size:11px;color:var(--dim);margin-top:4px}
.plan .pbadge{position:absolute;top:-9px;left:14px;background:var(--orange);color:#fff;font-size:9px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;padding:3px 9px;border-radius:99px}
.paytrust{display:flex;align-items:center;justify-content:center;gap:7px;font-size:11px;color:var(--dim);margin-top:12px}

/* instagram grid */
.igsec{margin-top:28px;padding-top:22px;border-top:1px solid var(--line)}
.ighead{display:flex;align-items:center;gap:11px;margin-bottom:14px}
.igav{width:46px;height:46px;border-radius:50%;flex-shrink:0;box-shadow:0 0 0 2px var(--surface),0 0 0 4px var(--aqua);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px;background:linear-gradient(135deg,var(--aqua),var(--blue))}
.igmeta{text-align:left;flex:1;min-width:0}
.ighandle{font-size:14.5px;font-weight:800;color:var(--text)}
.igtag{font-size:11.5px;color:var(--dim);margin-top:2px;line-height:1.3}
.iggrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.igtile{position:relative;aspect-ratio:1/1;border-radius:10px;overflow:hidden;display:block;background:linear-gradient(135deg,var(--bg3),var(--surface2));border:1px solid var(--line2)}
.igtile img{width:100%;height:100%;object-fit:cover;display:block}
.igtile .igph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--mute);font-size:10px;font-weight:600;letter-spacing:.04em}
.igbtn{display:flex;align-items:center;justify-content:center;gap:9px;margin-top:14px;width:100%;text-decoration:none;padding:15px;border-radius:14px;font-weight:700;font-size:15px;color:#fff;background:linear-gradient(95deg,#feda75,#fa7e1e,#d62976 55%,#962fbf 80%,#4f5bd5);box-shadow:0 14px 30px -12px rgba(214,41,118,.5)}
.igbtn svg{width:20px;height:20px;fill:#fff}

/* SCRATCH */
.scratch-wrap{text-align:center;display:flex;flex-direction:column}
.scratch-stage{position:relative;width:300px;max-width:100%;aspect-ratio:5/3;margin:6px auto 0;border-radius:20px;overflow:hidden;box-shadow:var(--shadow)}
.prize-under{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;background:radial-gradient(circle at 50% 30%,var(--aqua-deep),var(--navy))}
.prize-kicker{font-size:11px;letter-spacing:.16em;text-transform:uppercase;margin-bottom:8px;font-weight:700;color:var(--gold)}
.prize-title{font-size:23px;line-height:1.08;font-weight:800;color:#fff;letter-spacing:-.01em}
.prize-sub{font-size:12px;color:#d3e7f5;margin-top:9px;line-height:1.4;max-width:240px}
#scratchCanvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;cursor:grab}
.scratch-hint{font-size:12px;color:var(--aqua);margin-top:12px;letter-spacing:.02em;font-weight:600}
.jackpot-line{font-size:20px;font-weight:800;color:var(--gold);margin:14px 0 2px;display:none}
.confetti{position:fixed;top:-10px;width:9px;height:14px;z-index:60;pointer-events:none;border-radius:2px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:.9}}

/* coaching snippet (coach's note) */
.snip{background:var(--surface);border:1.5px solid rgba(15,180,196,.4);border-left:4px solid var(--aqua);border-radius:16px;padding:18px;box-shadow:var(--shadow-card);text-align:left;margin-top:4px}
.snip .sk{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.snip .sav{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--aqua),var(--blue));display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:14px;flex-shrink:0}
.snip .skk{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--aqua);font-weight:700}
.snip .skn{font-size:12px;color:var(--dim);font-weight:600;margin-top:2px}
.snip .st{font-size:16.5px;font-weight:700;line-height:1.35;color:var(--text);margin-bottom:8px}
.snip .sb{font-size:13.5px;line-height:1.55;color:var(--dim)}
.snip .sb b{color:var(--text)}
.snipstat{display:flex;align-items:center;gap:10px;background:rgba(15,180,196,.08);border:1px solid rgba(15,180,196,.25);border-radius:11px;padding:10px 13px;margin-top:12px;font-size:12.5px;font-weight:600;color:var(--text);text-align:left}
.snipstat b{color:var(--aqua);font-size:17px;flex-shrink:0}
/* milestone */
.mile{flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center}
.mile .mck{width:74px;height:74px;border-radius:50%;background:linear-gradient(135deg,var(--aqua),var(--blue));margin:0 auto 18px;display:flex;align-items:center;justify-content:center;box-shadow:0 18px 40px -14px rgba(15,180,196,.55);animation:pop .5s cubic-bezier(.34,1.56,.64,1) both}
.mile .mck svg{width:32px;height:32px;fill:#fff}
@keyframes pop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.mile h1{font-size:26px;margin-top:2px}
.milebars{display:flex;gap:7px;justify-content:center;margin:16px 0 4px}
.milebars i{width:34px;height:6px;border-radius:99px;background:var(--track)}
.milebars i.on{background:linear-gradient(90deg,var(--aqua),var(--blue))}
/* multi select */
.opt .box{width:22px;height:22px;border-radius:7px;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.15s}
.opt.sel .box{border-color:var(--aqua);background:var(--aqua)}
.opt.sel .box:after{content:"✓";color:#fff;font-weight:800;font-size:12px}
/* number inputs */
.numrow{display:flex;gap:11px;margin-top:4px}
.numrow .field{flex:1;margin-bottom:0}
.skiplink{text-align:center;margin-top:14px;font-size:13px;color:var(--dim);text-decoration:underline;cursor:pointer}
/* radar + pillar breakdown */
.radarcard{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:14px 10px 4px;margin:14px 0 4px;box-shadow:var(--shadow-card)}
.radarcard .rlab{font:600 10px 'Poppins',sans-serif;fill:var(--dim)}
.pillrows{margin:8px 8px 14px}
.prow2{display:flex;align-items:center;gap:9px;margin:7px 0;font-size:12px;font-weight:600;color:var(--text)}
.prow2 .nm2{width:100px;text-align:left;flex-shrink:0}
.prow2 .bar2{flex:1;height:6px;background:var(--track);border-radius:99px;overflow:hidden}
.prow2 .bar2 i{display:block;height:100%;background:linear-gradient(90deg,var(--aqua),var(--blue));border-radius:99px;transition:width .8s cubic-bezier(.22,1,.36,1)}
.prow2 .vv{width:30px;text-align:right;color:var(--aqua);font-weight:700;flex-shrink:0}
.prow2.weak .vv{color:var(--orange)}
.prow2.weak .bar2 i{background:linear-gradient(90deg,var(--orange),var(--orange-deep))}
.limbox{background:rgba(255,106,77,.08);border:1px solid rgba(255,106,77,.3);border-radius:14px;padding:14px 15px;margin:12px 0 2px;text-align:left}
.limbox .lk{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--orange);font-weight:700;margin-bottom:5px}
.limbox .ln2{font-size:19px;font-weight:800;color:var(--text);margin-bottom:5px}
.limbox p{font-size:12.5px;color:var(--dim);line-height:1.5}
.limbox p b{color:var(--text)}
.lvl-line{font-size:12px;color:var(--dim);margin-top:10px}
.lvl-line b{color:var(--text)}
/* tap feedback — ripple, float-up emoji, selection pop */
.opt,.gcard,.acard{position:relative;overflow:hidden}
.ripple{position:absolute;width:14px;height:14px;border-radius:50%;background:rgba(15,180,196,.35);transform:translate(-50%,-50%) scale(0);animation:rip .55s ease-out forwards;pointer-events:none}
@keyframes rip{to{transform:translate(-50%,-50%) scale(18);opacity:0}}
.floatup{position:fixed;z-index:80;font-size:21px;transform:translate(-50%,-50%);animation:flup .8s cubic-bezier(.22,1,.36,1) forwards;pointer-events:none}
@keyframes flup{20%{opacity:1}to{transform:translate(-50%,-190%) scale(1.3);opacity:0}}
.opt.sel,.gcard.sel,.acard.sel{animation:selPop .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes selPop{40%{transform:scale(1.025)}}
.opt.sel .tick{animation:pop .3s cubic-bezier(.34,1.56,.64,1)}
/* progress bar — shimmer + surfer riding the fill */
.bar{position:relative;overflow:visible}
.bar>i{position:relative;overflow:hidden}
.bar>i:after{content:"";position:absolute;inset:0;background:linear-gradient(100deg,transparent 30%,rgba(255,255,255,.55) 50%,transparent 70%);transform:translateX(-100%);animation:shim 2s linear infinite}
@keyframes shim{to{transform:translateX(100%)}}
#barsurfer{position:absolute;top:50%;left:0%;font-size:15px;transform:translate(-55%,-58%) scaleX(-1);transition:left .5s cubic-bezier(.4,0,.2,1);filter:drop-shadow(0 2px 3px rgba(12,42,63,.3));pointer-events:none}
.qcount.bump{animation:qbump .35s}
@keyframes qbump{40%{transform:scale(1.2);color:var(--aqua)}}
/* coach's note typing indicator */
.typing{display:flex;gap:5px;padding:8px 2px 4px}
.typing i{width:8px;height:8px;border-radius:50%;background:var(--aqua);opacity:.35;animation:tdot 1s infinite}
.typing i:nth-child(2){animation-delay:.15s}.typing i:nth-child(3){animation-delay:.3s}
@keyframes tdot{30%{opacity:1;transform:translateY(-3px)}}
.snipin{animation:childIn .45s cubic-bezier(.22,1,.36,1) both}
/* score reveal fx */
.radarg{transform-box:view-box;transform-origin:50% 49%;animation:radarIn .9s .3s cubic-bezier(.34,1.56,.64,1) backwards}
@keyframes radarIn{from{opacity:0;transform:scale(.25)}to{opacity:1;transform:scale(1)}}
.rdot{transform-box:fill-box;transform-origin:center;animation:dotIn .4s cubic-bezier(.34,1.56,.64,1) backwards}
@keyframes dotIn{from{opacity:0;transform:scale(0)}to{opacity:1;transform:scale(1)}}
.bignum.settled{animation:numSettle .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes numSettle{35%{transform:scale(1.14)}}
.limbox.attn{animation:attn 1.1s}
@keyframes attn{35%{box-shadow:0 0 0 8px rgba(255,106,77,.16)}70%,100%{box-shadow:0 0 0 0 rgba(255,106,77,0)}}
.gauge .bub{position:absolute;bottom:4px;width:9px;height:9px;border-radius:50%;background:rgba(15,180,196,.3);animation:rise 3.4s ease-in infinite}
.gauge .bub:nth-child(odd){width:6px;height:6px}
@keyframes rise{0%{transform:translateY(0);opacity:0}12%{opacity:.9}100%{transform:translateY(-118px);opacity:0}}
/* CTA shine sweep */
.cta{position:relative;overflow:hidden}
.cta:after{content:"";position:absolute;top:0;left:0;width:55%;height:100%;background:linear-gradient(105deg,transparent 20%,rgba(255,255,255,.35) 50%,transparent 80%);transform:translateX(-170%) skewX(-18deg);animation:ctashine 3.4s ease-in-out infinite}
@keyframes ctashine{0%,55%{transform:translateX(-170%) skewX(-18deg)}90%,100%{transform:translateX(330%) skewX(-18deg)}}
.cta:disabled:after{display:none}
/* milestone radiating rings */
.mck{position:relative}
.mck:before,.mck:after{content:"";position:absolute;inset:0;border-radius:50%;border:2px solid rgba(15,180,196,.5);animation:ringx 1.6s ease-out .35s infinite}
.mck:after{animation-delay:.95s}
@keyframes ringx{from{transform:scale(1);opacity:.8}to{transform:scale(1.95);opacity:0}}
/* loader + result juice */
.testi.tin{animation:childIn .5s both}
.chk.done .cb{animation:pop .35s cubic-bezier(.34,1.56,.64,1)}
.tiercard{animation:cardIn .65s .15s cubic-bezier(.22,1,.36,1) backwards}
@keyframes cardIn{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:none}}
.plan .pbadge{animation:badgeP 2s infinite}
@keyframes badgeP{50%{transform:scale(1.1)}}
.scratch-hint{animation:hintB 1.6s infinite}
@keyframes hintB{50%{transform:translateY(3px)}}
@media (prefers-reduced-motion:reduce){*,*:before,*:after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}}
.tag-debug{position:fixed;bottom:8px;left:10px;font-size:10px;font-family:monospace;z-index:50;color:#456}
.backlink{position:absolute;left:16px;top:14px;color:var(--mute);font-size:24px;cursor:pointer;z-index:6;line-height:1;padding:4px;display:none}
.backlink.show{display:block}
</style>
</head>
<body>
<div class="bgfx"><i class="b1"></i><i class="b2"></i><i class="b3"></i></div>
<div id="shell">
  <span class="backlink" id="back" onclick="goBack()">‹</span>
  <div id="topbar">
    <div class="brand"><div class="mark">IS</div><div class="wm">IMPROVE <b>SURFING</b></div></div>
    <div class="progress-wrap" id="progwrap" style="visibility:hidden">
      <div class="bar"><i id="barfill"></i><span id="barsurfer">🏄</span></div>
      <div class="qcount" id="qcount"></div>
    </div>
  </div>
  <div id="app"></div>
</div>
<div class="tag-debug" id="tagdebug"></div>

<script>
/* ============================================================
   WHAT'S YOUR SURF SCORE? — Improve Surfing (prototype v1)
   Dark-ocean theme · Poppins · progressive capture · Stripe end.
   Engine adapted from the JDL Burn Factor quiz.
   ============================================================ */

const STEPS = [
  { id:'intro', type:'intro' },

  { id:'name', type:'text', field:'name', placeholder:'Your first name',
    eyebrow:"Let's start", title:'First — <span class="hl">what should we call you?</span>',
    sub:'So we can personalise your Surf Score.' },

  { id:'gender', type:'gender', q:true,
    eyebrow:'About you', title:'Which best describes you?' },

  { id:'age', type:'imgcards', q:true,
    eyebrow:'The time factor', title:"What's your age range?",
    sub:'Every year on your own is a year of <b>waves left on the table.</b> The sooner you fix your technique, the faster it compounds.',
    options:[
      {label:'18–29',val:'18–29',img:'age1'},
      {label:'30–39',val:'30–39',img:'age2'},
      {label:'40–49',val:'40–49',img:'age3'},
      {label:'50+',val:'50+',img:'age4'},
    ]},

  /* ═══ Section 1 · Your surfing today ═══ */
  { id:'q1', type:'single', q:true,
    eyebrow:'Your surfing', title:"What's your <span class='hl'>main goal</span> in surfing right now?",
    sub:'Choose the one that feels most true today.',
    options:[
      {label:'Catch more waves & stand up consistently',val:'catch_waves'},
      {label:'Improve my turns & control on the wave face',val:'turns_control'},
      {label:'Surf with more flow, speed and style',val:'flow_style'},
      {label:'Ride bigger or more powerful waves',val:'bigger_waves'},
      {label:'Compete or push into high performance',val:'compete'},
    ]},

  { id:'q2', type:'single', q:true,
    eyebrow:'Your history', title:'How long have you been surfing?',
    options:[
      {label:'Less than 1 year',val:'under_1yr'},
      {label:'1–2 years',val:'1_2yr'},
      {label:'3–5 years',val:'3_5yr'},
      {label:'6–10 years',val:'6_10yr'},
      {label:'More than 10 years',val:'over_10yr'},
    ]},

  { id:'q3', type:'single', q:true,
    eyebrow:'Your rhythm', title:'How often do you surf?',
    options:[
      {label:'Less than once a week',val:'rarely',score:1},
      {label:'About once a week',val:'once_week',score:2},
      {label:'2–3 times a week',val:'2_3_week',score:3},
      {label:'4 or more times a week',val:'4plus_week',score:4},
    ]},

  { id:'q4', type:'single', q:true,
    eyebrow:'Paddle power', title:'How does your paddle fitness hold up in a typical session?',
    options:[
      {label:'I tire quickly — short sessions wear me out',val:'low',score:1},
      {label:'I manage, but fade in longer or bigger surf',val:'moderate',score:2},
      {label:'Solid most of the time',val:'good',score:3},
      {label:'Strong — fitness rarely limits me',val:'strong',score:4},
    ]},

  /* ═══ Section 2 · Technique diagnostic ═══ */
  { id:'q5', type:'single', q:true,
    eyebrow:'Technique check', title:'When you paddle for a wave, what usually happens?',
    sub:'Think about your average session, not your best day.',
    options:[
      {label:'I miss most of them, or nose-dive when I catch one',val:'miss_most',score:1},
      {label:'I catch waves but getting to my feet is inconsistent',val:'inconsistent_standup',score:2},
      {label:'I catch and stand reliably — I can angle on green waves',val:'reliable_angle',score:3},
      {label:'I angle, time it, and take off where I choose',val:'precise_takeoff',score:4},
    ]},

  { id:'sn5', type:'snippet', cond:()=>scOf('q5')!=null&&scOf('q5')<=2,
    content:()=>({
      title:"{nm}take-off inconsistency is the #1 plateau we coach.",
      body:"It's almost never strength — it's <b>positioning and timing</b>. Fix where you sit and when you go, and your wave count doubles. That's the fastest win in surfing.",
      stat:['2×',"wave count in ~6 weeks is the norm once positioning clicks"]
    })},

  { id:'q6', type:'single', q:true,
    eyebrow:'Technique check', title:"Before you paddle for a wave, how well do you read where it's going to break?",
    options:[
      {label:'I mostly react — I paddle when I see others go',val:'reactive',score:1},
      {label:'I can spot peaks but still misjudge timing a lot',val:'developing',score:2},
      {label:'I usually know where to be and pick decent waves',val:'capable',score:3},
      {label:'I read sets early and position before they arrive',val:'advanced',score:4},
    ]},

  { id:'sn6', type:'snippet', cond:()=>scOf('q6')!=null&&scOf('q6')<=2,
    content:()=>({
      title:"Wave reading isn't talent — it's pattern recognition.",
      body:"And you can't learn it by trial and error alone. It's the single skill <b>video analysis</b> accelerates the most — you literally watch the pattern until you own it.",
      stat:['#1',"skill our coaches fix fastest with video analysis"]
    })},

  { id:'q7', type:'single', q:true,
    eyebrow:'In the lineup', title:'In the lineup, how do you decide where to sit?',
    options:[
      {label:'I sit where others sit, or wherever feels safe',val:'follow_crowd',score:1},
      {label:'I have a rough idea but often end up in the wrong spot',val:'rough_idea',score:2},
      {label:'I use landmarks and adjust when I drift off position',val:'uses_landmarks',score:3},
      {label:'I read the peak, track my position, move with the sets',val:'reads_peak',score:4},
    ]},

  { id:'q8', type:'single', q:true,
    eyebrow:'On the wave', title:"Once you're on your feet, what does a typical ride look like?",
    sub:'Your average ride — not your best wave.',
    options:[
      {label:'Short ride — a few seconds, then I fall or kick off',val:'short_ride',score:1},
      {label:'I ride along the wave but mostly straight',val:'straight_trim',score:2},
      {label:'I turn both ways and link a couple of moves',val:'linking_turns',score:3},
      {label:'I control the line, generate speed, choose where to go',val:'controlled_line',score:4},
    ]},

  { id:'q9', type:'single', q:true,
    eyebrow:'Ocean sense', title:'How comfortable are you in the ocean in general?',
    options:[
      {label:'Still getting used to it — bigger days make me anxious',val:'uncomfortable',score:1},
      {label:'Comfortable in small surf, cautious when it builds',val:'cautious',score:2},
      {label:'At ease most days — I hesitate only in real conditions',val:'comfortable',score:3},
      {label:'Confident across a wide range of conditions',val:'confident',score:4},
    ]},

  { id:'q9b', type:'single', q:true, cond:()=>scOf('q9')!=null&&scOf('q9')<=2,
    eyebrow:'Quick follow-up', title:'When a bigger set lands on you, what actually happens?',
    sub:'No judgement — this tells us exactly where confidence work starts.',
    options:[
      {label:'I panic a bit — heart races, I rush to the surface',val:'panic',score:1},
      {label:'I cope, but it drains my confidence for the session',val:'copes',score:2},
      {label:'I stay calm — I just wait it out and paddle back',val:'calm',score:3},
    ]},

  { id:'ms1', type:'milestone', stage:2, confetti:24,
    title:"{nm}that's your ocean & technique read — done ✓",
    sub:'Strong start. Now the part most quizzes skip: how you actually surf the wave.',
    btn:'Keep going →' },

  { id:'q10', type:'single', q:true,
    eyebrow:'On the wave', title:'When you turn your board, which feels closest to what you actually do?',
    options:[
      {label:'I lean with my upper body and hope the board follows',val:'lean_hope',score:1},
      {label:'I shift my weight but turns feel clumsy or late',val:'weight_shift',score:2},
      {label:'I compress, rotate and extend — getting more consistent',val:'compress_rotate',score:3},
      {label:'I drive through turns and link them into the next section',val:'linked_turns',score:4},
    ]},

  { id:'q11', type:'single', q:true,
    eyebrow:'On the wave', title:'When a section closes out in front of you, what usually happens?',
    options:[
      {label:"I straighten out or fall — no time to react",val:'falls',score:1},
      {label:'I try to get around it, sometimes make it',val:'tries',score:2},
      {label:'I redirect or climb the foam to stay on the wave',val:'redirects',score:3},

function scOf(id){ return (state._sc&&state._sc[id]!=null)?state._sc[id]:null; }
const LEVEL_QS=['q5','q6','q7','q8','q9','q9b','q10','q11','q12','q13','q14','q14b'];
function levelAvg(){ let t=0,c=0; LEVEL_QS.forEach(q=>{const s=scOf(q); if(s!=null){t+=s;c++}}); return c?t/c:1; }
const LEVELS={1:'Foundation',2:'Directional Control',3:'Flow & Manoeuvring',4:'Mastery & Expression'};
const PILLARS={
  skill:{label:'Skill',qs:['q5','q8','q10','q11','q14','q14b']},
  theory:{label:'Wave IQ',qs:['q6','q7','q10','q11','q13','q14','q14b']},
  mindset:{label:'Mindset',qs:['q9','q9b','q11','q12','q13','q14']},
  ocean:{label:'Ocean Sense',qs:['q5','q6','q7','q9','q13']},
  fitness:{label:'Fitness',qs:['q3','q4']},
  equipment:{label:'Equipment',qs:['q15','q16']},
};
function pillarScores(){ const out={}; for(const k in PILLARS){ let t=0,c=0; PILLARS[k].qs.forEach(q=>{const s=scOf(q); if(s!=null){t+=s;c++}}); out[k]=c?Math.round(t/c*10)/10:null; } return out; }
const LIMITER_META={
  skill:{label:'Skill',fix:'technique-first coached sessions + surfskate drills'},
  theory:{label:'Wave IQ',fix:'video analysis + wave-reading theory'},
  mindset:{label:'Mindset',fix:'confidence coaching + apnea training'},
  ocean:{label:'Ocean Sense',fix:'lineup positioning work in guided sessions'},
  fitness:{label:'Fitness',fix:'paddle fitness + mobility programme'},
  equipment:{label:'Equipment',fix:'a board check + $200-off partner shapers'},
};
function limiterKey(){ const p=pillarScores(); let k=null,v=99; for(const key in p){ if(p[key]!=null&&p[key]<v){v=p[key];k=key;} } return k||'skill'; }
function computeScore(s){
  const avg=levelAvg();
  let sc=Math.round(avg/4*62); sc=Math.max(20,Math.min(58,sc));
  const lvl=Math.max(1,Math.min(4,Math.floor(avg+1e-9)));
  return {score:sc,potential:90,gap:90-sc,avg:Math.round(avg*10)/10,lvl,pillars:pillarScores(),limiter:limiterKey()};
}
const YEARS_STUCK={under_1yr:'a year','1_2yr':'2 years','3_5yr':'4 years','6_10yr':'6 years',over_10yr:'8 years'};
function computeProjection(s){
  // weeks to break through, faster with more sessions / higher commitment
  let weeks=22;
  if(s.sessions==='2+')weeks-=8; else if(s.sessions==='1-2')weeks-=4;
  if(s.commit==='allin')weeks-=4; else if(s.commit==='6mo')weeks-=2;
  if(levelAvg()<1.8)weeks+=2;
  weeks=Math.max(8,Math.min(24,weeks));
  return {weeks, stuck:YEARS_STUCK[s.q2]||'3 years'};
}

function emailSuggest(inp,box){
  const v=inp.value.trim(); const at=v.indexOf('@');

  ctx.fillStyle='rgba(255,255,255,.9)'; ctx.font='700 15px Poppins, sans-serif'; ctx.textAlign='center';
  ctx.fillText('SCRATCH HERE', r.width/2, r.height/2-4);
  ctx.font='24px serif'; ctx.fillText('🏄 ✦ 🏄', r.width/2, r.height/2+26);
  ctx.globalCompositeOperation='destination-out';
  let drawing=false, done=false;
  function pos(e){const t=e.touches?e.touches[0]:e;const b=cv.getBoundingClientRect();return{x:t.clientX-b.left,y:t.clientY-b.top}}
  function scratch(e){ if(!drawing)return; const p=pos(e); ctx.beginPath(); ctx.arc(p.x,p.y,24,0,7); ctx.fill();
    if(!done&&cleared()>0.5){ done=true; reveal(); } }
  function cleared(){ const d=ctx.getImageData(0,0,cv.width,cv.height).data; let c=0; for(let i=3;i<d.length;i+=40){if(d[i]===0)c++;} return c/(d.length/40); }
  cv.addEventListener('mousedown',e=>{drawing=true;scratch(e)});
  cv.addEventListener('mousemove',scratch);
  window.addEventListener('mouseup',()=>drawing=false);
  cv.addEventListener('touchstart',e=>{drawing=true;scratch(e);e.preventDefault()},{passive:false});
  cv.addEventListener('touchmove',e=>{scratch(e);e.preventDefault()},{passive:false});
  cv.addEventListener('touchend',()=>drawing=false);
}
function reveal(){
  const cv=document.getElementById('scratchCanvas'); if(cv){cv.style.transition='opacity .5s';cv.style.opacity=0;setTimeout(()=>cv.remove(),500);}
  document.getElementById('hint').style.display='none';
  document.getElementById('jackpot').style.display='block';
  document.getElementById('claimBtn').style.display='block';
  document.getElementById('guar').style.display='flex';
  burstConfetti();
}

function selectPlan(node,k){ state._sel=k; document.querySelectorAll('.plan').forEach(p=>p.classList.remove('sel')); node.classList.add('sel'); const pp=document.getElementById('payprice'); if(pp)pp.textContent='A$'+(parseFloat(TIERS[k].price.replace('A$',''))/7).toFixed(2); updateDebug(); }
function payTier(){ const t=TIERS[state._sel]; alert('(prototype) Opens the Stripe checkout for '+t.name+' — '+t.price+'/week.\nURL: '+t.url); }
function igFallback(img){ img.style.display='none'; const s=img.nextElementSibling; if(s)s.style.display='flex'; }
function burstConfetti(n){
  const cols=['#0fb4c4','#2b8fd6','#ff6a4d','#f5a623','#0c2a3f'];
  for(let i=0;i<(n||70);i++){ const c=document.createElement('div'); c.className='confetti';
    c.style.left=Math.random()*100+'vw'; c.style.background=cols[i%cols.length];
    c.style.animationDuration=(2+Math.random()*2)+'s'; c.style.animationDelay=(Math.random()*.4)+'s';
    document.body.appendChild(c); setTimeout(()=>c.remove(),4200); }
}
function val(id){const e=document.getElementById(id);return e?e.value.trim():''}
function animateNum(node,from,to,dur,fmt){const t0=performance.now();const iv=setInterval(()=>{const p=Math.min(1,(performance.now()-t0)/dur),e=1-Math.pow(1-p,3);node.textContent=fmt(from+(to-from)*e);if(p>=1)clearInterval(iv);},40);}
function updateDebug(){const sc=state._score?state._score.score:'—';const tier=state._tier||(state.commit?pickTier(state):'—');document.getElementById('tagdebug').textContent=`[debug] lvl:${levelAvg().toFixed(2)} · score:${sc} · lim:${limiterKey()} · tier:${tier}`;}
render();
